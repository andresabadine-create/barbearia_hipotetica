spring:
  application:
    name: agendamento

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/barbearia}
    username: ${DB_USER:barbearia}
    password: ${DB_PASSWORD:barbearia}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # 8080 costuma estar ocupada por outros serviços (ex.: Apache do EnterpriseDB),
  # então a API sobe na 8081.
  port: ${SERVER_PORT:8081}

app:
  jwt:
    # Em produção, defina JWT_SECRET com uma chave forte (>= 32 caracteres).
    secret: ${JWT_SECRET:dev-secret-troque-em-producao-0123456789-0123456789}
    # Validade do token em milissegundos (24h).
    expiration: ${JWT_EXPIRATION:86400000}
