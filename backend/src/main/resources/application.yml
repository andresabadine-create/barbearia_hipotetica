spring:
  application:
    name: agendamento

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/barbearia}
    username: ${DB_USER:barbearia}
    password: ${DB_PASSWORD:barbearia}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Em produção (ex.: Render) a porta chega pela variável PORT.
  # Localmente, SERVER_PORT ou o default 8081 (8080 costuma estar ocupada).
  port: ${PORT:${SERVER_PORT:8081}}

app:
  jwt:
    # Em produção, defina JWT_SECRET com uma chave forte (>= 32 caracteres).
    secret: ${JWT_SECRET:dev-secret-troque-em-producao-0123456789-0123456789}
    # Validade do token em milissegundos (24h).
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    # Origens permitidas (CORS), separadas por vírgula. Em produção defina
    # CORS_ORIGINS com a URL do frontend na Vercel (ex.: https://barbearia.vercel.app).
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

  # Rate limiting por IP (token bucket em memória). Valores em requisições/minuto.
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:120}          # limite geral por IP
    auth-capacity: ${RATE_LIMIT_AUTH_CAPACITY:10} # limite em /api/auth/** (anti brute-force)

  # Ambiente de demonstração: limpeza + re-seed periódicos para não acumular visitas.
  demo:
    reset:
      enabled: ${DEMO_RESET_ENABLED:true}
      cron: ${DEMO_RESET_CRON:0 0 */6 * * *}       # a cada 6 horas
      zone: ${DEMO_RESET_ZONE:America/Sao_Paulo}
