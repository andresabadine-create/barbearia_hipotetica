# Configuração de teste: banco H2 em memória, sem Docker/Postgres/Flyway.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

server:
  port: 0

app:
  jwt:
    secret: chave-de-teste-0123456789-0123456789-0123456789
    expiration: 3600000
