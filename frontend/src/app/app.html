<header class="topbar">
  <a routerLink="/" class="brand">💈 Barbearia</a>
  @if (isLoggedIn()) {
    <nav class="topbar-nav">
      <a routerLink="/appointments" routerLinkActive="active" class="topbar-link">Agendamentos</a>
      <a routerLink="/loyalty" routerLinkActive="active" class="topbar-link">Fidelidade</a>
      <a
        routerLink="/notifications"
        routerLinkActive="active"
        class="topbar-link bell"
        aria-label="Notificações">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        @if (unread() > 0) {
          <span class="bell-badge">{{ unread() }}</span>
        }
      </a>
      @if (isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="topbar-link">Admin</a>
      }
      <span class="greeting">Olá, {{ user()?.nome }}</span>
      <button type="button" class="logout" (click)="logout()">
        <svg class="logout-icon" viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sair
      </button>
    </nav>
  }
</header>

<main class="container">
  <router-outlet />
</main>
